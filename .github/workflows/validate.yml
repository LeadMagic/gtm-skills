name: Validate Skills

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'scripts/**'
      - '.github/workflows/validate.yml'
  pull_request:
    branches: [main]
    paths:
      - 'skills/**'
      - 'scripts/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate all skills
        run: node scripts/validate-skills.js
