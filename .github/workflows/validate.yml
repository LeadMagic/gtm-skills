name: Validate Skills

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'scripts/**'
      - 'docs/**'
      - '.claude-plugin/**'
      - '.github/**'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
      - 'CODE_OF_CONDUCT.md'
      - 'GOVERNANCE.md'
      - 'SUPPORT.md'
      - 'CHANGELOG.md'
      - 'CITATION.cff'
      - 'LICENSE'
      - 'package.json'
      - 'skills.lock'
      - 'taxonomy.csv'
      - 'install.sh'
  pull_request:
    branches: [main]
    paths:
      - 'skills/**'
      - 'scripts/**'
      - 'docs/**'
      - '.claude-plugin/**'
      - '.github/**'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
      - 'CODE_OF_CONDUCT.md'
      - 'GOVERNANCE.md'
      - 'SUPPORT.md'
      - 'CHANGELOG.md'
      - 'CITATION.cff'
      - 'LICENSE'
      - 'package.json'
      - 'skills.lock'
      - 'taxonomy.csv'
      - 'install.sh'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - name: Syntax check scripts
        run: |
          node --check scripts/validate-skills.js
          node --check scripts/generate-indexes.js
          python3 -m py_compile scripts/generate-skills-lock.py scripts/install-tui.py scripts/public-repo-audit.py
      - name: Validate skills, lock, installer, and public hygiene
        run: npm run check
      - name: Verify generated files are current
        run: |
          npm run build
          git diff --exit-code -- AGENTS.md CLAUDE.md README.md taxonomy.csv skills.lock .claude-plugin/plugin.json .claude-plugin/marketplace.json
      - name: Publish dry-run
        run: gh skill publish --dry-run
