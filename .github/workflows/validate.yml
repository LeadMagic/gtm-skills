name: Validate Skills

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'references/**'
      - 'scripts/**'
      - 'docs/**'
      - '.claude-plugin/**'
      - '.github/**'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
      - 'CODE_OF_CONDUCT.md'
      - 'GOVERNANCE.md'
      - 'SUPPORT.md'
      - 'CHANGELOG.md'
      - 'CITATION.cff'
      - 'LICENSE'
      - 'package.json'
      - 'skills.lock'
      - 'taxonomy.csv'
      - 'install.sh'
      - '.githooks/**'
  pull_request:
    branches: [main]
    paths:
      - 'skills/**'
      - 'references/**'
      - 'scripts/**'
      - 'docs/**'
      - '.claude-plugin/**'
      - '.github/**'
      - 'AGENTS.md'
      - 'CLAUDE.md'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - 'SECURITY.md'
      - 'CODE_OF_CONDUCT.md'
      - 'GOVERNANCE.md'
      - 'SUPPORT.md'
      - 'CHANGELOG.md'
      - 'CITATION.cff'
      - 'LICENSE'
      - 'package.json'
      - 'skills.lock'
      - 'taxonomy.csv'
      - 'install.sh'
      - '.githooks/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Syntax check scripts
        run: |
          node --check scripts/validate-skills.js
          node --check scripts/generate-indexes.js
          node --check scripts/generate-pitfalls-index.js
          python3 -m py_compile \
            scripts/generate-skills-lock.py \
            scripts/install-tui.py \
            scripts/public-repo-audit.py \
            scripts/audit-references.py \
            scripts/strip-commit-trailers.py \
            scripts/check-commit-attribution.py \
            scripts/fix-decoration-authority.py \
            scripts/fix-weak-skill-artifacts.py \
            scripts/sync-execution-artifacts.py

      - name: Block agent co-author commit trailers
        run: python3 scripts/check-commit-attribution.py

      - name: Skill structure, references, lock, installer, public hygiene
        run: npm run check

      - name: Regenerate catalogs and fail on drift
        run: npm run check:generated

      - name: Publish dry-run
        run: gh skill publish --dry-run
