name: Regenerate Catalogs

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
      - 'scripts/**'
      - 'references/**'
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: regenerate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  regenerate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: true

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Regenerate catalogs and lockfile
        run: bash scripts/regenerate.sh

      - name: Commit and push if drift
        run: |
          set -euo pipefail
          artifacts=()
          while IFS= read -r line || [[ -n "$line" ]]; do
            line="${line%%#*}"
            line="$(echo "$line" | xargs)"
            [[ -z "$line" ]] && continue
            artifacts+=("$line")
          done < scripts/generated-artifacts.txt

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -- "${artifacts[@]}"

          if git diff --staged --quiet; then
            echo "Generated artifacts already current — nothing to commit."
            exit 0
          fi

          git commit -m "$(cat <<'EOF'
chore: regenerate catalogs and lockfile [skip ci]

Auto-regenerated by .github/workflows/regenerate.yml
EOF
)"
          git push
